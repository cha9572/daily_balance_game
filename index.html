<html lang="ko">

<head>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"

  <style>
    :root {
      --bg-color: #f3f4f6;
      --text-color: #1f2937;
      --btn-a-color: #3b82f6;
      /* Blue */
      --btn-b-color: #ef4444;
      /* Red */
      --btn-a-hover: #2563eb;
      --btn-b-hover: #dc2626;
      --card-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      margin: 0;
    }

    .layout-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - 40px);
    }

    .container {
      width: 100%;
      max-width: 480px;
      /* Mobile first */
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin-top: 2rem;
      flex-shrink: 0;
    }

    header {
      text-align: center;
      padding: 24px 20px;
      border-bottom: 1px solid #f3f4f6;
    }

    h1.logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #111827;
    }

    .content-area {
      padding: 32px 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .question-box {
      text-align: center;
      margin-bottom: 32px;
    }

    .question-box h2 {
      font-size: 1.35rem;
      font-weight: 800;
      line-height: 1.4;
      word-break: keep-all;
      color: #1f2937;
    }

    /* Voting View */
    .vote-view {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .vote-btn {
      width: 100%;
      padding: 24px 20px;
      border: none;
      border-radius: 20px;
      font-size: 1.125rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
      word-break: keep-all;
      line-height: 1.3;
    }

    .vote-btn:active {
      transform: scale(0.97);
    }

    .btn-a {
      background-color: var(--btn-a-color);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
    }

    .btn-a:hover {
      background-color: var(--btn-a-hover);
    }

    .btn-b {
      background-color: var(--btn-b-color);
      box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
    }

    .btn-b:hover {
      background-color: var(--btn-b-hover);
    }

    .vs-badge {
      text-align: center;
      font-weight: 800;
      color: #d1d5db;
      font-size: 1.125rem;
      margin: 4px 0;
    }

    /* Results View */
    .result-view {
      display: none;
      flex-direction: column;
      gap: 24px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 1rem;
    }

    .stat-header .option-text {
      flex: 1;
      padding-right: 12px;
      line-height: 1.3;
    }

    .stat-header .percent {
      font-size: 1.25rem;
      font-weight: 800;
    }

    .progress-bg {
      width: 100%;
      height: 24px;
      background-color: #f3f4f6;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      border-radius: 12px;
      width: 0%;
      /* Will be set via JS */
      transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .progress-a {
      background-color: var(--btn-a-color);
    }

    .progress-b {
      background-color: var(--btn-b-color);
    }

    .my-pick-badge {
      font-size: 0.75rem;
      font-weight: 800;
      background-color: #111827;
      color: white;
      padding: 4px 8px;
      border-radius: 12px;
      margin-left: 8px;
      display: inline-block;
      vertical-align: middle;
    }

    .total-votes {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #6b7280;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .share-btn {
      margin-top: 16px;
      width: 100%;
      padding: 16px;
      background-color: #10b981;
      color: #ffffff;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
      transition: transform 0.1s, background-color 0.2s;
    }

    .share-btn:active {
      transform: scale(0.98);
    }

    .share-btn:hover {
      background-color: #059669;
    }

    /* Ad Placeholders */
    .ad-placeholder {
      background-color: #f3f4f6;
      color: #9ca3af;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      border-radius: 16px;
      text-align: center;
      border: 2px dashed #d1d5db;
    }

    .ad-small {
      width: 100%;
      height: 60px;
    }

    .ad-large {
      width: 100%;
      height: 250px;
    }

    .ad-skyscraper {
      width: 100%;
      height: 100%;
    }

    /* Bottom Ad */
    .bottom-ad-container {
      width: 100%;
      max-width: 848px;
      margin: 24px auto;
      padding: 0 20px;
    }

    /* Side Ads */
    .side-ad-container {
      display: none;
      /* 모바일에서는 숨김 */
      width: 160px;
      height: 600px;
      position: sticky;
      top: 2rem;
      flex-shrink: 0;
      margin-top: 2rem;
    }

    /* 화면이 넓어지면 양옆 광고 표시 (160 + 24 + 480 + 24 + 160 = 848px + 여백) */
    @media (min-width: 900px) {
      .side-ad-container {
        display: block;
      }
    }
  </style>
</head>

          <button class="share-btn" onclick="shareNative()">

              stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">

      화면 최하단 배너 광고 (가로형)

  </div>

  <script>
    // Supabase 설정
    const SUPABASE_URL = 'https://snstaqjxqnpibgdkgphw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuc3RhcWp4cW5waWJnZGtncGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjg1MzUsImV4cCI6MjA5MzQwNDUzNX0.mDA8SryxsEksmlAzy9J47wbr3sCB_5xD5lFwhI0IXGQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 사용자가 선택한 항목 텍스트 저장용
    let myChoiceText = "";

    // 하드코딩된 병맛 밸런스 게임 질문 배열 (총 30개)
    const questions = [
      { q: "평생 양치 안 하기 vs 평생 샤워 안 하기", a: "평생 양치 안 하기", b: "평생 샤워 안 하기" },
      { q: "100% 확률로 100만원 받기 vs 10% 확률로 100억원 받기", a: "100% 확률로 100만원 받기", b: "10% 확률로 100억원 받기" },
      { q: "한여름에 패딩 입고 살기 vs 한겨울에 반팔 입고 살기", a: "한여름에 패딩 입고 살기", b: "한겨울에 반팔 입고 살기" },
      { q: "탄산 없는 미지근한 콜라 마시기 vs 치즈 없는 퍽퍽한 피자 먹기", a: "탄산 없는 미지근한 콜라 마시기", b: "치즈 없는 퍽퍽한 피자 먹기" },
      { q: "평생 스마트폰 없이 살기 vs 평생 친구 없이 살기", a: "평생 스마트폰 없이 살기", b: "평생 친구 없이 살기" },
      { q: "바퀴벌레맛 초콜릿 먹기 vs 초콜릿맛 바퀴벌레 먹기", a: "바퀴벌레맛 초콜릿 먹기", b: "초콜릿맛 바퀴벌레 먹기" },
      { q: "과거로 돌아가서 비트코인 사기 vs 미래로 가서 이번주 로또 번호 알아오기", a: "과거로 돌아가서 비트코인 사기", b: "미래로 가서 이번주 로또 번호 알아오기" },
      { q: "머리 안 감고 일주일 버티기 vs 양치 안 하고 일주일 버티기", a: "머리 안 감고 일주일 버티기", b: "양치 안 하고 일주일 버티기" },
      { q: "재채기할 때마다 방귀 뀌기 vs 방귀 뀔 때마다 트림하기", a: "재채기할 때마다 방귀 뀌기", b: "방귀 뀔 때마다 트림하기" },
      { q: "평생 라면만 먹기 vs 평생 치킨 안 먹기", a: "평생 라면만 먹기", b: "평생 치킨 안 먹기" },
      { q: "평생 겨울에 모기 물리기 vs 평생 여름에 감기 걸리기", a: "평생 겨울에 모기 물리기", b: "평생 여름에 감기 걸리기" },
      { q: "똥맛 카레 먹기 vs 카레맛 똥 먹기", a: "똥맛 카레 먹기", b: "카레맛 똥 먹기" },
      { q: "눈물 흘릴 때마다 콧물 나기 vs 콧물 날 때마다 눈물 흘리기", a: "눈물 흘릴 때마다 콧물 나기", b: "콧물 날 때마다 눈물 흘리기" },
      { q: "평생 고기 없이 살기 vs 평생 밀가루 없이 살기", a: "평생 고기 없이 살기", b: "평생 밀가루 없이 살기" },
      { q: "사막에서 한 달 살기 vs 무인도에서 한 달 살기", a: "사막에서 한 달 살기", b: "무인도에서 한 달 살기" },
      { q: "평생 씻어도 몸에서 냄새나기 vs 평생 안 씻어도 향기나기", a: "평생 씻어도 몸에서 냄새나기", b: "평생 안 씻어도 향기나기" },
      { q: "하루 종일 누워만 있기 vs 하루 종일 서서만 있기", a: "하루 종일 누워만 있기", b: "하루 종일 서서만 있기" },
      { q: "1년 동안 인터넷 없이 살기 vs 1년 동안 말 한마디도 안 하기", a: "1년 동안 인터넷 없이 살기", b: "1년 동안 말 한마디도 안 하기" },
      { q: "매일 지각하는 팀원과 일하기 vs 매일 화내는 팀장과 일하기", a: "매일 지각하는 팀원과 일하기", b: "매일 화내는 팀장과 일하기" },
      { q: "머리카락이 손가락 길이만큼 빨리 자라기 vs 손톱이 머리카락 길이만큼 빨리 자라기", a: "머리카락이 손가락 길이만큼 빨리 자라기", b: "손톱이 머리카락 길이만큼 빨리 자라기" },
      { q: "평생 피자 끝부분만 먹기 vs 평생 햄버거 빵만 먹기", a: "평생 피자 끝부분만 먹기", b: "평생 햄버거 빵만 먹기" },
      { q: "노트북 없이 대학 생활하기 vs 스마트폰 없이 대학 생활하기", a: "노트북 없이 대학 생활하기", b: "스마트폰 없이 대학 생활하기" },
      { q: "5살 지능의 상사 모시기 vs 상사 지능의 5살 아이 돌보기", a: "5살 지능의 상사 모시기", b: "상사 지능의 5살 아이 돌보기" },
      { q: "매일 야근하고 월 1000만원 받기 vs 매일 칼퇴하고 월 200만원 받기", a: "매일 야근하고 월 1000만원 받기", b: "매일 칼퇴하고 월 200만원 받기" },
      { q: "눈 감고 1주일 살기 vs 귀 막고 1주일 살기", a: "눈 감고 1주일 살기", b: "귀 막고 1주일 살기" },
      { q: "과거의 흑역사 전 세계 생중계 vs 미래의 내 죽는 모습 미리 보기", a: "과거의 흑역사 전 세계 생중계", b: "미래의 내 죽는 모습 미리 보기" },
      { q: "물만 마셔도 살찌는 체질 vs 아무리 먹어도 살 안 찌지만 항상 배고픈 체질", a: "물만 마셔도 살찌는 체질", b: "아무리 먹어도 살 안 찌지만 항상 배고픈 체질" },
      { q: "매일 꿈에서 귀신 보기 vs 매일 가위에 눌리기", a: "매일 꿈에서 귀신 보기", b: "매일 가위에 눌리기" },
      { q: "휴대폰 배터리 항상 1% vs 와이파이 항상 1칸", a: "휴대폰 배터리 항상 1%", b: "와이파이 항상 1칸" },
      { q: "모기가 귓가에서 앵앵거리는데 못 잡기 vs 파리가 밥 먹는데 계속 앉기", a: "모기가 귓가에서 앵앵거리는데 못 잡기", b: "파리가 밥 먹는데 계속 앉기" }
    ];

    // 매일 자정에 초기화되는 로직을 위해 오늘 날짜(YYYY-MM-DD)를 가져옴
    function getTodayString() {
      const now = new Date();
      return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    }

    // 오늘의 질문 가져오기 (날짜를 시드로 사용하여 하루 종일 같은 질문이 나오도록)
    function getDailyQuestion(today) {
      // 간단한 해시 함수로 날짜 문자열을 인덱스로 변환
      let hash = 0;
      for (let i = 0; i < today.length; i++) {
        hash = today.charCodeAt(i) + ((hash << 5) - hash);
      }
      const index = Math.abs(hash) % questions.length;
      return questions[index];
    }

    const todayStr = getTodayString();
    const currentQuestion = getDailyQuestion(todayStr);

    // UI 초기화
    document.getElementById('question-text').innerText = currentQuestion.q;
    document.getElementById('btn-a').innerText = currentQuestion.a;
    document.getElementById('btn-b').innerText = currentQuestion.b;
    document.getElementById('result-text-a').innerText = currentQuestion.a;
    document.getElementById('result-text-b').innerText = currentQuestion.b;

    // 로컬 스토리지 확인 (오늘 이미 투표했는지)
    const savedVoteStr = localStorage.getItem('daily_balance_game_vote');
    const savedVote = savedVoteStr ? JSON.parse(savedVoteStr) : null;

    if (savedVote && savedVote.date === todayStr) {
      // 이미 투표한 경우 바로 결과 화면 표시
      document.getElementById('vote-view').style.display = 'none';
      document.getElementById('result-view').style.display = 'flex';
      myChoiceText = savedVote.choice === 'A' ? currentQuestion.a : currentQuestion.b;
      fetchStatsAndShow(savedVote.choice);
    }

    async function fetchStatsAndShow(choice) {
      // 내가 선택한 항목에 뱃지 추가
      const myPickBadge = '<span class="my-pick-badge">내 선택</span>';
      if (choice === 'A') {
        document.getElementById('result-text-a').innerHTML = currentQuestion.a + myPickBadge;
      } else {
        document.getElementById('result-text-b').innerHTML = currentQuestion.b + myPickBadge;
      }

      try {
        // Supabase에서 실제 득표수 가져오기
        const { data, error } = await supabaseClient
          .from('votes')
          .select('votes_a, votes_b')
          .eq('date', todayStr)
          .maybeSingle();

        let votesA = 0;
        let votesB = 0;

        if (data) {
          votesA = data.votes_a || 0;
          votesB = data.votes_b || 0;
        }

        const total = votesA + votesB;

        let percentA = 0;
        let percentB = 0;
        if (total > 0) {
          percentA = Math.round((votesA / total) * 100);
          percentB = 100 - percentA;
        }

        // 숫자 및 게이지 바 업데이트 (애니메이션 적용 위해 약간의 지연)
        setTimeout(() => {
          document.getElementById('percent-a').innerText = `${percentA}%`;
          document.getElementById('percent-b').innerText = `${percentB}%`;
          document.getElementById('bar-a').style.width = `${percentA}%`;
          document.getElementById('bar-b').style.width = `${percentB}%`;
          document.getElementById('total-votes').innerText = `총 ${total.toLocaleString()}명이 참여했어요!`;
        }, 50);
      } catch (error) {
        console.error("통계 데이터를 불러오는 중 오류 발생:", error);
      }
    }

    async function handleVote(choice) {
      // 투표 화면 숨기고 결과 화면 표시
      document.getElementById('vote-view').style.display = 'none';
      document.getElementById('result-view').style.display = 'flex';

      myChoiceText = choice === 'A' ? currentQuestion.a : currentQuestion.b;

      // 로컬 스토리지에 투표 데이터 저장 (내일 자정까지 유지됨)
      localStorage.setItem('daily_balance_game_vote', JSON.stringify({
        date: todayStr,
        choice: choice
      }));

      // 먼저 로딩 상태의 화면을 위해 0% 렌더링 시도 (또는 기존 데이터)
      fetchStatsAndShow(choice);

      try {
        // Supabase RPC(원자적 증가 함수) 호출
        const { error } = await supabaseClient.rpc('increment_vote', {
          vote_date: todayStr,
          choice_column: choice
        });

        if (error) {
          console.error("Supabase 투표 처리 오류:", error);
        }

        // 투표 반영 후 실제 통계 데이터를 다시 불러옴
        fetchStatsAndShow(choice);
      } catch (error) {
        console.error("투표 처리 중 오류 발생:", error);
      }
    }

    function shareNative() {
      const shareMessage = `나는 [${myChoiceText}] 골랐음 ㅋㅋ 너는 뭐 고를래?`;

      if (navigator.share) {
        navigator.share({
          title: '오늘의 밸런스 게임 ⚖️',
          text: shareMessage,
          url: window.location.href,
        }).catch((error) => console.log('공유 실패', error));
      } else {
        // Web Share API를 지원하지 않는 브라우저의 경우 클립보드 복사
        navigator.clipboard.writeText(`${shareMessage}\n${window.location.href}`)
          .then(() => alert("링크가 클립보드에 복사되었습니다!"))
          .catch(() => alert("공유 기능을 지원하지 않는 브라우저입니다."));
      }
    }
  </script>
</body>

</html>
